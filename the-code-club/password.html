<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Enter your password</title>
        <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Concert+One&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <script src="password.js"></script>
    </head>

    <body class="pwd">

        <!-- password area -->
        <div id="password-area">
            <div>
                <nav>
                    <span class="logo">CodeClub</span>
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                </nav>
            </div>
            
            <div 
                id="content-area">
                        <h2>Please enter your password to continue...</h2>

            </div>
        </div>
        <div class="input-group flex-nowrap">
            <div class="input-group-prepend">
                <span class="input-group-text" id="addon-wrapping">Name:</span>
            </div>
            <input type="text" class="form-control" placeholder="Username" aria-label="Username" aria-describedby="addon-wrapping">
        </div>
        <div class="input-group flex-nowrap">
            <div class="input-group-prepend">
                <span class="input-group-text" id="addon-wrapping">Password:</span>
            </div>
            <input type="password" id="passwordBox" class="form-control" placeholder="letmein" aria-label="Password" aria-describedby="addon-wrapping">
            <button onclick="checkPassword();">Submit</button>
            <p id="wrongPass"></p>
        </div>        

    </body>
</html>

name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Upload site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-preview-pr-${{ github.event.pull_request.number }}
          path: |
            index.html
            pricing.html
            samples.html
            order.html
            style.css
            main.js
            assets/
          retention-days: 14

      - name: Post preview instructions on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
            const liveUrl = `https://mattis-klein.github.io/`;
            const marker = `<!-- deploy-preview-bot -->`;
            const body = [
              marker,
              `## 👀 How to preview this PR`,
              ``,
              `### Option 1 — Download & open locally (instant, no setup)`,
              `1. Go to the [workflow run](${artifactUrl})`,
              `2. Scroll to **Artifacts** at the bottom`,
              `3. Download **site-preview-pr-${prNumber}**`,
              `4. Unzip and open \`index.html\` in your browser`,
              ``,
              `### Option 2 — Run the repo locally`,
              `\`\`\`bash`,
              `git checkout ${context.payload.pull_request.head.ref}`,
              `python3 -m http.server 8080`,
              `# then open http://localhost:8080/`,
              `\`\`\``,
              ``,
              `### Option 3 — Live site (after merge)`,
              `Once merged to \`main\`, the site is live at **${liveUrl}**`,
              ``,
              `> _Updated on every push to this PR._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

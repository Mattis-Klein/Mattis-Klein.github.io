<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="140" viewBox="0 0 520 140" role="img" aria-label="Simcha Poems logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <g transform="translate(20,18)">
    <rect x="0" y="0" rx="28" ry="28" width="104" height="104" fill="url(#g)"/>
    <!-- Open book left page -->
    <path d="M16 74 L16 36 C16 33 19 30 22 30 L52 32 L52 76 Z" fill="#fff" opacity="0.90"/>
    <!-- Open book right page -->
    <path d="M52 32 L82 30 C85 30 88 33 88 36 L88 74 L52 76 Z" fill="#fff" opacity="0.75"/>
    <!-- Book spine -->
    <line x1="52" y1="32" x2="52" y2="76" stroke="rgba(13,148,136,0.3)" stroke-width="2"/>
    <!-- Left page lines -->
    <line x1="22" y1="44" x2="48" y2="44" stroke="rgba(13,148,136,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="53" x2="48" y2="53" stroke="rgba(13,148,136,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="62" x2="42" y2="62" stroke="rgba(13,148,136,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right page lines -->
    <line x1="56" y1="44" x2="82" y2="44" stroke="rgba(13,148,136,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="53" x2="82" y2="53" stroke="rgba(13,148,136,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="62" x2="74" y2="62" stroke="rgba(13,148,136,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Quill (feather outline + shaft) -->
    <path d="M76 16 C88 10 100 20 94 38 C90 48 82 54 76 64" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.88"/>
    <path d="M78 18 C82 30 80 44 76 64" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.80"/>
  </g>
  <!-- Wordmark -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" fill="#134e4a">
    <text x="145" y="70" font-size="54" font-weight="800" letter-spacing="0.5">Simcha</text>
    <text x="145" y="110" font-size="44" font-weight="700" fill="#0d9488" letter-spacing="0.3">Poems</text>
  </g>
</svg>
